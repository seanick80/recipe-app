      created_at:
        type: datetime
        surfaces: [sql, sqlalchemy, swiftdata, testfixtures]
      items:
        type: relationship
        surfaces: [sqlalchemy, swiftdata, testfixtures]

  TemplateItem:
    fields:
      id:
