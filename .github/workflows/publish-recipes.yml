name: Publish Recipes to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'data/published-recipes/**'
      - 'scripts/publish-recipes.py'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate static site
        run: python scripts/publish-recipes.py --output-dir build/gh-pages

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/gh-pages
          publish_branch: gh-pages
          force_orphan: true
          cname: recipes.ouryearofwander.com
