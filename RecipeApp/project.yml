name: RecipeApp

options:
  bundleIdPrefix: com.seanick80
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 3JR8WTJUV6
    SWIFT_VERSION: "5.9"
    # CODE_SIGN_STYLE is deliberately not set here. Codemagic runs
    # `xcode-project use-profiles` after `xcodegen generate`, which
    # installs the stored provisioning profile and flips signing to
    # Manual with the correct PROVISIONING_PROFILE_SPECIFIER. Setting
    # Automatic (or Manual) here would be overridden and can conflict
    # with the xcodebuild CODE_SIGN_STYLE=Manual override Codemagic
    # passes on the archive command line.

targets:
  RecipeApp:
    type: application
    platform: iOS
    sources:
      # Single recursive scan. xcodegen picks up RecipeApp/MLModels/*.mlpackage
      # as a source file and Xcode compiles it to .mlmodelc during the build.
      # An earlier version of this file had a second entry listing
      # RecipeApp/MLModels with `type: folder + buildPhase: resources`, which
      # caused the .mlpackage to be bundled TWICE: once raw (~164 MB folder
      # reference copied into Resources) and once compiled (~164 MB .mlmodelc
      # emitted by Xcode's ML compile rule from the recursive scan). Result:
      # a ~330 MB IPA instead of ~180 MB. Do not re-add that entry.
      - path: RecipeApp
    dependencies:
      - target: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seanick80.recipeapp
        CODE_SIGN_ENTITLEMENTS: RecipeApp/RecipeApp.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # iPad requires all four orientations for multitasking support. altool
        # (TestFlight validator) rejects universal iOS bundles with a 409
        # "No orientations were specified" unless this key is set, even if the
        # app will rarely be launched on iPad. To ship iPhone-only instead,
        # set TARGETED_DEVICE_FAMILY: "1" and drop this key.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.2.0"
        INFOPLIST_KEY_NSCameraUsageDescription: "Camera is used to scan barcodes, shopping lists, and recipes"
        # CoreMotion is used by the camera-preview tilt coach. Without this
        # string iOS kills the app the moment we call
        # `CMMotionManager.startDeviceMotionUpdates` — see CameraViewModel.
        INFOPLIST_KEY_NSMotionUsageDescription: "Motion data is used to coach you to hold the phone level while scanning"
        # Skip the per-build "Export Compliance" prompt in App Store Connect.
        # The app uses only HTTPS (URLSession) which is exempt; no custom
        # crypto is bundled. If that ever changes (e.g. we add an encrypted
        # local cache), flip this to true and answer the prompts in ASC.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - "Info.plist"
      # RecipeSchemaParser + ListLineParser + GroceryCategorizer are compiled
      # into the extension so it can parse recipes and ingredient lines.
      # These are the same SharedLogic files copied into RecipeApp/Parsers/
      # at CI build time.
      - path: RecipeApp/Parsers/RecipeSchemaParser.swift
      - path: RecipeApp/Parsers/ListLineParser.swift
      - path: RecipeApp/Parsers/GroceryCategorizer.swift
    info:
      properties:
        CFBundleDisplayName: Import Recipe
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seanick80.recipeapp.share-extension
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.2.0"

  RecipeAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RecipeAppTests
    dependencies:
      - target: RecipeApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seanick80.recipeapp.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  RecipeApp:
    build:
      targets:
        RecipeApp: all
        ShareExtension: all
        RecipeAppTests: [test]
    test:
      targets:
        - RecipeAppTests
