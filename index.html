<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Recipes</title>
    <meta property="og:title" content="Our Recipes">
    <meta property="og:type" content="website">

    <style>
:root {
    --bg: #faf9f6;
    --text: #2c2c2c;
    --accent: #c45d3e;
    --muted: #7a7a7a;
    --border: #e8e4df;
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #1a1a1a;
        --text: #e8e4df;
        --accent: #e07850;
        --muted: #999;
        --border: #3a3a3a;
    }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
}
a { color: var(--text); text-decoration: none; }
a:hover { color: var(--accent); }
h1 { font-size: 2rem; font-weight: 400; margin-bottom: 0.5rem; }
.subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 2.5rem; }
.recipe-list { list-style: none; }
.recipe-list li {
    border-bottom: 1px solid var(--border);
    padding: 1rem 0;
}
.recipe-list a { font-size: 1.1rem; }
.recipe-meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.25rem;
}
.empty {
    color: var(--muted);
    font-style: italic;
    margin-top: 2rem;
}
@media (max-width: 480px) {
    body { padding: 1.5rem 1rem; }
    h1 { font-size: 1.5rem; }
}

    </style>
</head>
<body>

</html>
