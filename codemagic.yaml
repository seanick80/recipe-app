workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: recipe-app-appstore-key
    environment:
      # Signing is backed by a persistent iOS Development cert issued once
      # via scripts/generate-signing-identity.sh and uploaded to Codemagic
      # as a stored Code Signing Identity with reference name
      # `ios_development_cert`. This block tells Codemagic to load that
      # .p12 into the build keychain automatically before scripts run.
      # See secrets/ios_dev_cert_record.md for the renewal procedure.
      ios_signing:
        certificates:
          - ios_development_cert
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd RecipeApp
          xcodegen generate
      - name: Fetch or create development provisioning profile
        script: |
          set -euxo pipefail
          # The stored .p12 already gave us a usable signing identity in
          # the keychain (via environment.ios_signing). All we need is a
          # matching provisioning profile. fetch-signing-files --create
          # will create the profile if it doesn't exist, and reuse the
          # existing iOS Development cert in ASC. No private key is
          # passed, so it will not attempt to issue a new cert.
          app-store-connect fetch-signing-files \
            "com.seanick80.recipeapp" \
            --type IOS_APP_DEVELOPMENT \
            --create \
            --log-api-calls
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build
        script: |
          cd RecipeApp
          xcode-project build-ipa \
            --project RecipeApp.xcodeproj \
            --scheme RecipeApp
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - user@example.com
