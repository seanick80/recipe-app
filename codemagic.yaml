workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: recipe-app-appstore-key
    environment:
      # Explicit manual code signing. Both the iOS Development cert
      # and the matching provisioning profile are pre-uploaded to
      # Codemagic's Code Signing Identities / Provisioning Profiles
      # stores and referenced by name here. Codemagic loads them into
      # the build keychain before scripts run.
      #
      # - ios_development_cert:    issued by scripts/generate-signing-identity.sh
      #                            (ASC resource 3QHBXMYCGH, expires 2027-04-11)
      # - ios_development_profile: created by `app-store-connect profiles create`
      #                            against Bundle ID 4586SWVUT3 (ASC resource
      #                            U3BL9G576X, expires 2027-04-11). Includes
      #                            device R42YWH9Q22 (Nick's iPhone).
      #
      # Codemagic's managed signing (distribution_type+bundle_identifier)
      # was tried first and failed with "No matching profiles found"
      # because managed signing only fetches pre-uploaded profiles, it
      # does not create new ones via ASC. See secrets/ios_dev_cert_record.md
      # for cert + profile renewal procedures.
      ios_signing:
        provisioning_profiles:
          - ios_development_profile
        certificates:
          - ios_development_cert
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd RecipeApp
          xcodegen generate
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build
        script: |
          cd RecipeApp
          xcode-project build-ipa \
            --project RecipeApp.xcodeproj \
            --scheme RecipeApp
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - user@example.com
