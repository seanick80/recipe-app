workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: recipe-app-appstore-key
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd RecipeApp
          xcodegen generate
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Create development signing certificate
        script: |
          set -euxo pipefail
          # 1. Generate a fresh 2048-bit RSA private key on the Mac runner.
          # 2. Feed it to app-store-connect certificates create so the
          #    CLI signs a CSR and uploads just the public cert to ASC.
          # 3. --save stashes the cert+key pair in the Codemagic session
          #    keychain so subsequent steps (fetch-signing-files, keychain
          #    add-certificates, xcode-project use-profiles) can use it.
          #
          # We generate the key ourselves rather than relying on the CLI's
          # auto-generation because older versions of codemagic-cli-tools
          # require an explicit --certificate-key argument.
          #
          # Apple allows up to 2 active iOS Development certs per account.
          # If this step ever fails with a limit error, revoke unused ones
          # at https://developer.apple.com/account/resources/certificates
          mkdir -p "$CM_BUILD_DIR/private"
          PRIVATE_KEY_PATH="$CM_BUILD_DIR/private/ios_development_key.pem"
          openssl genrsa -out "$PRIVATE_KEY_PATH" 2048
          app-store-connect certificates create \
            --type IOS_DEVELOPMENT \
            --certificate-key=@file:"$PRIVATE_KEY_PATH" \
            --log-api-calls \
            --save
      - name: Fetch or create development provisioning profile
        script: |
          app-store-connect fetch-signing-files \
            "com.seanick80.recipeapp" \
            --type IOS_APP_DEVELOPMENT \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build
        script: |
          cd RecipeApp
          xcode-project build-ipa \
            --project RecipeApp.xcodeproj \
            --scheme RecipeApp
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - user@example.com
