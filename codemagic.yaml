workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build
        script: |
          cd RecipeApp
          xcodebuild build -project RecipeApp.xcodeproj \
            -scheme RecipeApp \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - RecipeApp/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - user@example.com
