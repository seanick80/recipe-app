workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: recipe-app-appstore-key
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd RecipeApp
          xcodegen generate
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Create development signing certificate
        script: |
          set -euxo pipefail
          # 1. Generate a fresh 2048-bit RSA private key on the Mac runner.
          # 2. Feed it to app-store-connect certificates create so the
          #    CLI signs a CSR and uploads just the public cert to ASC.
          # 3. --save stashes the public cert in the Codemagic session.
          # 4. Export PRIVATE_KEY_PATH via CM_ENV so subsequent steps
          #    (fetch-signing-files in particular) can re-pair the cert
          #    with the private key when building the .p12.
          #
          # We generate the key ourselves rather than relying on the CLI's
          # auto-generation because codemagic-cli-tools requires an
          # explicit --certificate-key ("Cannot create resource without
          # certificate private key").
          #
          # Apple allows up to 2 active iOS Development certs per account.
          # If this step ever fails with a limit error, revoke unused ones
          # at https://developer.apple.com/account/resources/certificates
          mkdir -p "$CM_BUILD_DIR/private"
          PRIVATE_KEY_PATH="$CM_BUILD_DIR/private/ios_development_key.pem"
          openssl genrsa -out "$PRIVATE_KEY_PATH" 2048
          app-store-connect certificates create \
            --type IOS_DEVELOPMENT \
            --certificate-key=@file:"$PRIVATE_KEY_PATH" \
            --log-api-calls \
            --save
          echo "PRIVATE_KEY_PATH=$PRIVATE_KEY_PATH" >> "$CM_ENV"
      - name: Fetch or create development provisioning profile
        script: |
          set -euxo pipefail
          # fetch-signing-files is a separate CLI invocation that does NOT
          # inherit the private key from the previous step. We have to
          # hand it back via --certificate-key so it can bundle the cert
          # it fetches from ASC into a usable .p12.
          app-store-connect fetch-signing-files \
            "com.seanick80.recipeapp" \
            --type IOS_APP_DEVELOPMENT \
            --certificate-key=@file:"$PRIVATE_KEY_PATH" \
            --log-api-calls \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build
        script: |
          cd RecipeApp
          xcode-project build-ipa \
            --project RecipeApp.xcodeproj \
            --scheme RecipeApp
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - user@example.com
