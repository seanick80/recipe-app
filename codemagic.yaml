workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: recipe-app-appstore-key
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd RecipeApp
          xcodegen generate
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files (create if missing)
        script: |
          app-store-connect fetch-signing-files \
            "com.seanick80.recipeapp" \
            --type IOS_APP_DEVELOPMENT \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build
        script: |
          cd RecipeApp
          xcode-project build-ipa \
            --project RecipeApp.xcodeproj \
            --scheme RecipeApp
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - user@example.com
