workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: recipe-app-appstore-key
    environment:
      # App-level environment variable group defined in Codemagic UI.
      # Contains RECIPIENT_EMAIL (marked secure) so the notification
      # address never lands in source control. Add more non-secret
      # config (URLs, flags) here rather than hardcoding in yaml.
      groups:
        - recipe_app_notifications
      # Explicit manual code signing with App Store Distribution identities.
      # Both the iOS Distribution cert and the matching App Store
      # provisioning profile are pre-uploaded to Codemagic's Code Signing
      # Identities / Provisioning Profiles stores and referenced by name
      # here. Codemagic loads them into the build keychain before scripts
      # run. Distribution (not Development) is required because TestFlight
      # rejects dev-signed IPAs at altool upload time.
      #
      # - ios_distribution_cert:    issued by
      #                             `scripts/generate-signing-identity.sh --type distribution`
      # - ios_distribution_profile: created by
      #                             `scripts/generate-distribution-profile.sh`
      #                             (type IOS_APP_STORE, bound to the cert above)
      #
      # An ios_development_cert + ios_development_profile pair also exists
      # in Codemagic for historical reasons (sideloadable dev builds).
      # They are not referenced here — TestFlight is now the only
      # distribution channel. See secrets/ios_dist_cert_record.md for
      # cert + profile renewal procedures.
      ios_signing:
        provisioning_profiles:
          - ios_distribution_profile
          # Share Extension needs its own App Store provisioning profile
          # bound to com.seanick80.recipeapp.share-extension. Create via:
          #   scripts/generate-distribution-profile.sh --bundle-id com.seanick80.recipeapp.share-extension
          # Upload to Codemagic as ios_share_extension_profile.
          - ios_share_extension_profile
        certificates:
          - ios_distribution_cert
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
      cancel_previous_builds: true
    when:
      changeset:
        includes:
          - 'RecipeApp/'
          - 'SharedLogic/'
          - 'codemagic.yaml'
    scripts:
      - name: Install xcodegen
        script: |
          set -euo pipefail
          brew install xcodegen
          xcodegen --version
      - name: Copy shared parser modules into iOS sources
        script: |
          set -euo pipefail
          mkdir -p RecipeApp/RecipeApp/Parsers
          cp SharedLogic/ListLineParser.swift \
             SharedLogic/OCRParser.swift \
             SharedLogic/DetectionClassifier.swift \
             SharedLogic/BarcodeProductMapper.swift \
             SharedLogic/PantryItemMapper.swift \
             SharedLogic/GroceryCategorizer.swift \
             SharedLogic/QualityGate.swift \
             SharedLogic/ZoneClassifier.swift \
             SharedLogic/DebugLog.swift \
             SharedLogic/PrepNoteStripper.swift \
             SharedLogic/ContentDetector.swift \
             SharedLogic/FuzzyMatcher.swift \
             SharedLogic/RecipeSchemaParser.swift \
             RecipeApp/RecipeApp/Parsers/
          echo "Copied $(ls RecipeApp/RecipeApp/Parsers/ | wc -l) files to Parsers/"
          ls -la RecipeApp/RecipeApp/Parsers/
      - name: Generate Xcode project
        script: |
          set -euo pipefail
          cd RecipeApp
          xcodegen generate
      - name: Bump CFBundleVersion for TestFlight upload
        # TestFlight rejects uploads whose CFBundleVersion is <= any build
        # already accepted for the same CFBundleShortVersionString. project.yml
        # pins it to "1" for local/dev builds; on CI we stamp it with
        # Codemagic's $BUILD_NUMBER (a monotonically increasing per-workflow
        # counter) plus a safety offset so we stay past any earlier manual
        # archives. agvtool edits the generated .pbxproj in place, so this
        # must run after `xcodegen generate` and before `build-ipa`.
        script: |
          set -euo pipefail
          cd RecipeApp
          NEW_BUILD=$((BUILD_NUMBER + 100))
          echo "Stamping CFBundleVersion = $NEW_BUILD"
          agvtool new-version -all "$NEW_BUILD"
      - name: Debug ShareExtension plist config
        script: |
          set +e  # entire step is non-fatal diagnostics
          cd RecipeApp

          echo "=== Tool versions ==="
          xcodegen --version 2>/dev/null || echo "xcodegen version unknown"
          xcodebuild -version | head -2

          echo ""
          echo "=== ShareExtension build settings ==="
          SETTINGS=$(xcodebuild -project RecipeApp.xcodeproj \
            -target ShareExtension -showBuildSettings 2>/dev/null)
          echo "$SETTINGS" | grep -E 'INFOPLIST_FILE|GENERATE_INFOPLIST|PRODUCT_BUNDLE_ID|WRAPPER_EXTENSION|PRODUCT_MODULE_NAME'

          echo ""
          echo "=== Source plist (INFOPLIST_FILE) ==="
          PLIST=$(echo "$SETTINGS" | grep ' INFOPLIST_FILE ' | awk '{print $3}')
          echo "INFOPLIST_FILE = $PLIST"
          if [ -f "$PLIST" ]; then
            echo "--- raw file ---"
            cat "$PLIST"
          else
            echo "FILE NOT FOUND at $PLIST"
          fi

          echo ""
          echo "=== All Info.plist files in project ==="
          find . -name 'Info.plist' -not -path './.git/*' -exec echo {} \; -exec plutil -p {} \; 2>/dev/null

          echo ""
          echo "=== xcodegen-generated plist files ==="
          find . -name '*-Info.plist' -not -path './.git/*' 2>/dev/null
          find . -name 'Info*.plist' -not -path './.git/*' -not -name 'Info.plist' 2>/dev/null

          echo ""
          echo "=== Build ShareExtension for simulator (unsigned) ==="
          xcodebuild build \
            -project RecipeApp.xcodeproj \
            -target ShareExtension \
            -sdk iphonesimulator \
            -configuration Debug \
            CONFIGURATION_BUILD_DIR=/tmp/share_ext_debug \
            2>&1 | tail -30 || true

          echo ""
          echo "=== Built .appex contents ==="
          APPEX=$(find /tmp/share_ext_debug -name 'ShareExtension.appex' -type d 2>/dev/null | head -1)
          if [ -n "$APPEX" ]; then
            echo "Found at: $APPEX"
            ls -la "$APPEX/"
            echo "--- Info.plist (plutil -p) ---"
            plutil -p "$APPEX/Info.plist" 2>/dev/null || echo "plutil failed"
            echo "--- NSExtension key check ---"
            plutil -extract NSExtension json "$APPEX/Info.plist" 2>/dev/null || echo "NSExtension key NOT FOUND in built plist"
          else
            echo "No .appex found under /tmp/share_ext_debug"
            find /tmp/share_ext_debug -type f -name '*.plist' 2>/dev/null
          fi

          echo ""
          echo "=== Diagnostic step complete ==="
          exit 0  # always succeed
      - name: Dump final RecipeApp Info.plist (diagnostic)
        script: |
          set +e
          cd RecipeApp
          echo "=== RecipeApp build settings (plist-related) ==="
          SETTINGS=$(xcodebuild -project RecipeApp.xcodeproj \
            -target RecipeApp -showBuildSettings 2>/dev/null)
          echo "$SETTINGS" | grep -E 'INFOPLIST_FILE|GENERATE_INFOPLIST'

          echo ""
          echo "=== Source Info.plist (before Xcode processing) ==="
          cat RecipeApp/Info.plist

          echo ""
          echo "=== Build RecipeApp for simulator to inspect processed plist ==="
          xcodebuild build \
            -project RecipeApp.xcodeproj \
            -target RecipeApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=/tmp/recipeapp_debug \
            2>&1 | tail -5 || true

          APP=$(find /tmp/recipeapp_debug -name 'RecipeApp.app' -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            echo ""
            echo "=== Processed Info.plist in built .app ==="
            plutil -p "$APP/Info.plist"
            echo ""
            echo "=== CFBundleURLTypes check ==="
            plutil -extract CFBundleURLTypes json "$APP/Info.plist" 2>/dev/null || echo "CFBundleURLTypes NOT FOUND in built plist"
            echo ""
            echo "=== GIDClientID check ==="
            plutil -extract GIDClientID raw "$APP/Info.plist" 2>/dev/null || echo "GIDClientID NOT FOUND in built plist"
          else
            echo "No RecipeApp.app found under /tmp/recipeapp_debug"
          fi
          exit 0
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Run XCTests
        script: |
          mkdir -p /tmp/xcodebuild_logs
          cd RecipeApp
          set -o pipefail
          xcodebuild test \
            -project RecipeApp.xcodeproj \
            -scheme RecipeApp \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -resultBundlePath ../build/test-results \
            2>&1 | tee /tmp/xcodebuild_logs/xctest.log | xcpretty
      - name: Build
        script: |
          cd RecipeApp
          xcode-project build-ipa \
            --project RecipeApp.xcodeproj \
            --scheme RecipeApp
      - name: Generate TestFlight release notes
        # Pulls the last few feat:/fix: commits off master and formats them
        # as a "What to Test" bullet list, preserving GM-N references.
        # Built-in `publishing.app_store_connect` doesn't expose a
        # whats-new hook, so we write to a file and pass it to the
        # codemagic CLI in the next step.
        #
        # Invoke via `bash` (not `./script.sh`) so we don't depend on the
        # git-tracked executable bit — Git Bash on Windows tends to lose
        # it, which previously silently produced an empty file and
        # broke the publish step downstream.
        script: |
          set -euo pipefail
          bash scripts/generate-release-notes.sh > /tmp/release_notes.txt
          echo "=== TestFlight release notes ==="
          cat /tmp/release_notes.txt
          if [[ ! -s /tmp/release_notes.txt ]]; then
            echo "ERROR: release notes file is empty" >&2
            exit 1
          fi
      - name: Publish to TestFlight
        # Uses the same ASC API key integration as signing
        # (`recipe-app-appstore-key`); the key needs App Manager or
        # higher role for TestFlight uploads. `--testflight` alone
        # submits for internal testing (ASC users); add `--beta-group`
        # once an external group is configured in ASC.
        script: |
          set -euo pipefail
          NOTES="$(cat /tmp/release_notes.txt)"
          if [[ -z "${NOTES}" ]]; then
            echo "ERROR: refusing to publish with empty --whats-new" >&2
            exit 1
          fi
          app-store-connect publish \
            --path 'RecipeApp/build/ios/ipa/*.ipa' \
            --testflight \
            --whats-new "${NOTES}"
    artifacts:
      # The Build step cd's into RecipeApp/ before running
      # `xcode-project build-ipa`, so the IPA lands at
      # $CM_BUILD_DIR/RecipeApp/build/ios/ipa/*.ipa, NOT at
      # $CM_BUILD_DIR/build/ios/ipa/. Artifact globs are resolved
      # relative to $CM_BUILD_DIR, so the RecipeApp/ prefix is
      # required or the IPA silently fails to upload and the build
      # publishes only the xcodebuild log.
      - RecipeApp/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/release_notes.txt
      - /tmp/share_ext_debug/**/*.plist
    publishing:
      email:
        # Address lives in the `recipe_app_notifications` Codemagic env var
        # group as $RECIPIENT_EMAIL (marked secure) so no PII ends up in
        # source control. Update it in the Codemagic UI, not here.
        recipients:
          - $RECIPIENT_EMAIL

  # -----------------------------------------------------------------------
  # ML Model Conversion — manual workflow
  # -----------------------------------------------------------------------
  # Converts upstream ML models to CoreML format. Run manually from the
  # Codemagic UI when switching models or updating conversion settings.
  # Download the .mlpackage artifacts, commit them to the repo, and push.
  #
  # No automatic trigger — select "ML Model Conversion" in the Codemagic
  # dashboard and click "Start new build".
  ml-model-conversion:
    name: ML Model Conversion
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - recipe_app_ml
      xcode: latest
    scripts:
      - name: Install Python dependencies
        script: |
          pip3 install coremltools torch torchvision transformers Pillow numpy
      - name: Convert models
        script: |
          python3 scripts/convert-food-model.py
      - name: Show model sizes
        script: |
          echo "=== Converted models ==="
          du -sh RecipeApp/RecipeApp/MLModels/*.mlpackage
      - name: Install xcodegen
        script: |
          set -euo pipefail
          brew install xcodegen
          xcodegen --version
      - name: Prepare Xcode project for tests
        script: |
          set -euo pipefail
          mkdir -p RecipeApp/RecipeApp/Parsers
          cp SharedLogic/ListLineParser.swift \
             SharedLogic/OCRParser.swift \
             SharedLogic/DetectionClassifier.swift \
             SharedLogic/BarcodeProductMapper.swift \
             SharedLogic/PantryItemMapper.swift \
             SharedLogic/GroceryCategorizer.swift \
             SharedLogic/QualityGate.swift \
             SharedLogic/ZoneClassifier.swift \
             SharedLogic/DebugLog.swift \
             SharedLogic/PrepNoteStripper.swift \
             SharedLogic/ContentDetector.swift \
             SharedLogic/FuzzyMatcher.swift \
             SharedLogic/RecipeSchemaParser.swift \
             RecipeApp/RecipeApp/Parsers/
          echo "Copied $(ls RecipeApp/RecipeApp/Parsers/ | wc -l) files to Parsers/"
          ls -la RecipeApp/RecipeApp/Parsers/
          cd RecipeApp
          xcodegen generate
      - name: Run ML model tests
        script: |
          mkdir -p /tmp/xcodebuild_logs
          cd RecipeApp
          set -o pipefail
          xcodebuild test \
            -project RecipeApp.xcodeproj \
            -scheme RecipeApp \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -only-testing:RecipeAppTests/MLModelTests \
            -resultBundlePath ../build/ml-test-results \
            2>&1 | tee /tmp/xcodebuild_logs/ml-test.log | xcpretty
      - name: Print download instructions
        script: |
          echo ""
          echo "Download .mlpackage dirs from the Artifacts tab, then:"
          echo "  cp -r ~/Downloads/*.mlpackage RecipeApp/RecipeApp/MLModels/"
          echo "  git add RecipeApp/RecipeApp/MLModels/*.mlpackage"
          echo "  git commit -m 'Update CoreML models'"
    artifacts:
      - RecipeApp/RecipeApp/MLModels/*.mlpackage
      - /tmp/xcodebuild_logs/*.log
