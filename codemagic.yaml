workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: recipe-app-appstore-key
    environment:
      # Managed signing via the App Store Connect integration. Codemagic
      # picks up a matching iOS Development cert from its Code Signing
      # Identities store (we uploaded one as `ios_development_cert`,
      # produced by scripts/generate-signing-identity.sh) and fetches or
      # creates a matching provisioning profile for the bundle id via
      # the ASC API before scripts run. See secrets/ios_dev_cert_record.md
      # for the cert renewal procedure.
      #
      # Schema note: Codemagic requires EITHER distribution_type +
      # bundle_identifier OR a provisioning_profiles list. A bare
      # `certificates:` list is not a valid ios_signing shape.
      ios_signing:
        distribution_type: development
        bundle_identifier: com.seanick80.recipeapp
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd RecipeApp
          xcodegen generate
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Build
        script: |
          cd RecipeApp
          xcode-project build-ipa \
            --project RecipeApp.xcodeproj \
            --scheme RecipeApp
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - user@example.com
